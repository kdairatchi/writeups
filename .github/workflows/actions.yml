name: Medium Writeups

on:
  schedule:
    - cron: '*/10 * * * *'
  push:
    branches:
      - main

# Actions project permission
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23.4'  # Specify the version of Go you want to use

    - name: Scraping Medium Writeups
      run: |
        mkdir -p writeups
        go run main.go | tee writeups/medium-feed.md

    - name: Refresh library indexes
      run: |
        python3 scripts/sync_library.py

    - name: Keep root README as library index
      run: |
        test -f README.md

    - name: Commit and push changes if there are any
      run: |
        git config user.name 'GitHub Actions'
        git config user.email 'actions@users.noreply.github.com'
        git add writeups/medium-feed.md README.md reports/README.md reports/INDEX.md writeups/README.md writeups/INDEX.md MANIFEST.json
        
        # Check if there are changes before committing
        if ! git diff --cached --exit-code; then
          IST_DATE=$(TZ='Asia/Kolkata' date +'%a %b %d %H:%M:%S IST %Y')
          git commit -m "Updated List: $IST_DATE"
          git push
        else
          echo "No changes to commit"
        fi
